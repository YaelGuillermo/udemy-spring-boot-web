<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(
        pageTitle='Access Denied',
        content=~{::section},
        pageScripts=null
      )}">
<head></head>
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg mt-5">
                <div class="card-header bg-danger text-white text-center py-4">
                    <h1 class="display-1 mb-0">
                        <i class="bi bi-shield-exclamation"></i>
                    </h1>
                    <h2 class="h4 mb-0 mt-2">Access Denied</h2>
                </div>
                
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <i class="bi bi-lock-fill text-danger" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h3 class="h5 fw-bold mb-3">You don't have permission to access this resource</h3>
                    
                    <p class="text-muted mb-4">
                        Sorry, but you do not have the necessary privileges to view this page.
                        Please contact your administrator if you believe this is an error.
                    </p>
                    
                    <div class="alert alert-warning" role="alert">
                        <i class="bi bi-info-circle"></i>
                        Required role: <strong>ADMIN</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
