<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content, pageScripts)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">My Application</title>

    <link rel="stylesheet" th:href="@{/css/jquery-ui.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-database"></i> MyApp
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Menú izquierda -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/list}">
                        <i class="bi bi-people"></i> Clients
                    </a>
                </li>
            </ul>
            
            <!-- Menú derecha con dropdown de usuario -->
            <ul class="navbar-nav">
                <!-- Dropdown para usuario autenticado -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">Username</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right"></i> Log Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                
                <!-- Muestra Sign In solo si NO está autenticado -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${warning != null}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${warning}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${info != null}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="bi bi-info-circle-fill"></i> <span th:text="${info}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<div class="container mt-4">
    <div th:replace="${content}"></div>
</div>

<!-- Footer -->
<footer class="footer mt-5 py-3 bg-light border-top">
    <div class="container text-center">
        <span class="text-muted" sec:authorize="isAuthenticated()">
            <i class="bi bi-person-circle"></i> 
            User: <strong sec:authentication="name"></strong> | 
            Roles: <strong sec:authentication="authorities"></strong>
        </span>
        <span class="text-muted" sec:authorize="!isAuthenticated()">
            <i class="bi bi-person"></i> Guest (not authenticated)
        </span>
        <span class="text-muted mx-2">|</span>
        <span class="text-muted">
            <i class="bi bi-calendar"></i> 
            <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> MyApp
        </span>
    </div>
</footer>

<script th:src="@{/js/jquery-4.0.0.min.js}"></script>
<script th:src="@{/js/jquery-ui.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<th:block th:if="${pageScripts != null}">
    <th:block th:replace="${pageScripts}"></th:block>
</th:block>

</body>
</html>
